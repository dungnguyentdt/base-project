<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
    <!-- Background gradient -->
    <defs>
        <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
        </linearGradient>
    </defs>
    
    <!-- Background -->
    <rect width="1200" height="800" fill="url(#bgGradient)"/>
    
    <!-- Decorative circles -->
    <circle cx="200" cy="150" r="80" fill="rgba(255,255,255,0.1)"/>
    <circle cx="1000" cy="700" r="120" fill="rgba(255,255,255,0.1)"/>
    <circle cx="600" cy="400" r="100" fill="rgba(255,255,255,0.05)"/>
    
    <!-- Decorative lines -->
    <line x1="0" y1="100" x2="1200" y2="100" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
    
    <!-- Login icon placeholder -->
    <g transform="translate(600, 400)">
        <circle cx="0" cy="0" r="50" fill="rgba(255,255,255,0.2)" stroke="white" stroke-width="2"/>
        <path d="M -15 -10 Q 0 -25 15 -10 Q 15 0 0 10 Q -15 0 -15 -10" fill="white"/>
    </g>
</svg>